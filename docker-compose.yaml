services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "8000"
    environment:
      - APP_NAME=GS Creative Agency
      - DEBUG=false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/') || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
