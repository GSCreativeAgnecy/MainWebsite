{% extends "base.html" %}

{% block content %}

<section class="relative min-h-screen flex items-center bg-grid">
    <div class="absolute inset-0 bg-gradient-to-br from-gray-950 via-gray-900 to-gray-950"></div>
    
    <div class="relative z-10 max-w-2xl mx-auto px-4 text-center">
        <div class="animate-fade-in-up">
            <span class="text-8xl sm:text-9xl font-extrabold gradient-text">404</span>
            <h1 class="text-3xl sm:text-4xl font-bold text-white mt-4 mb-4">
                Page Not Found
            </h1>
            <p class="text-gray-400 text-lg mb-8">
                Looks like this page took a creative detour. Let's get you back on track.
            </p>
            <a href="/" class="inline-flex items-center px-8 py-3.5 bg-brand-500 hover:bg-brand-400 text-gray-900 font-semibold rounded-lg transition-all hover-lift">
                Go Home
                <svg class="ml-2 w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"/>
                </svg>
            </a>
        </div>
    </div>
</section>

{% endblock %}
